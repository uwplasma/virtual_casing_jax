name: External Benchmarks

on:
  workflow_dispatch:
    inputs:
      benchmark:
        description: External benchmark entry point
        required: true
        default: simsopt-vc
        type: choice
        options:
          - simsopt-vc
          - extender
          - bmw

jobs:
  external-benchmark:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install base package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Run selected benchmark scaffold
        run: |
          case "${{ inputs.benchmark }}" in
            simsopt-vc)
              benchmarks/external/run_simsopt_vc_compare.sh
              ;;
            extender)
              benchmarks/external/run_extender_compare.sh
              ;;
            bmw)
              benchmarks/external/run_bmw_compare.sh
              ;;
          esac
