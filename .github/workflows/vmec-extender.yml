name: VMEC Extender Bridge

on:
  workflow_dispatch:
    inputs:
      vmec_jax_ref:
        description: vmec_jax git ref to test against
        required: false
        default: main

jobs:
  vmec-bridge-smoke:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout virtual_casing_jax
        uses: actions/checkout@v4
        with:
          path: virtual_casing_jax
      - name: Checkout vmec_jax
        uses: actions/checkout@v4
        with:
          repository: uwplasma/vmec_jax
          ref: ${{ inputs.vmec_jax_ref }}
          path: vmec_jax
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e virtual_casing_jax
          python -m pip install -e vmec_jax
      - name: Run focused extender tests and VMEC bridge example
        env:
          JAX_ENABLE_X64: "1"
          JAX_PLATFORMS: cpu
        run: |
          cd virtual_casing_jax
          python -m pytest -q \
            tests/test_exterior_field_branch_sign.py \
            tests/test_exterior_field_cylindrical.py \
            tests/test_exterior_field_gradients.py \
            tests/test_exterior_field_grid_export.py \
            tests/test_exterior_objectives.py \
            tests/test_vmec_jax_bridge.py
          python examples/vmec_extender_python_api.py
          python benchmarks/vmec_extender_smoke_benchmark.py
